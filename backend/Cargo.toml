[package]
name = "backend"
version = "2.1.1"
edition = "2024"
authors = ["UberMetroid <admin@ubermetroid.com>"]
license = "Apache-2.0"
repository = "https://github.com/UberMetroid/Beam"
homepage = "https://github.com/UberMetroid/Beam"
description = "Axum backend service for Beam."
readme = "../README.md"

[dependencies]
shared-assets = { path = "../frontend/Assets/shared-assets/shared-rust" }
tokio = { version = "1.36", features = ["macros", "rt-multi-thread", "net", "fs", "time", "sync"] }
tokio-util = { version = "0.7", features = ["io"] }
axum = { version = "0.8", features = ["multipart"] }
tower-http = { version = "0.6", features = ["fs", "cors", "trace", "limit"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dotenvy = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum-extra = { version = "0.12", features = ["cookie"] }
rand = "0.8"
chrono = { version = "0.4", default-features = false, features = ["std", "serde", "clock"] }
percent-encoding = "2.3"
constant_time_eq = "0.3"
sha2 = "0.11"

[package.metadata.deb]
name = "beam"
changelog = "debian/changelog"
copyright = "2026 UberMetroid <admin@ubermetroid.com>"
maintainer = "UberMetroid <admin@ubermetroid.com>"
extended-description = """\
Beam is a high-performance, self-hosted file sharing portal built in Rust. \
It provides drag-and-drop folder uploads, configurable quotas, and automatic \
retention purges."""
depends = "$auto, libc6, ca-certificates"
section = "utils"
priority = "optional"
maintainer-scripts = "debian"
assets = [
    ["target/release/backend", "usr/bin/beam", "755"],
    ["../README.md", "usr/share/doc/beam/README.md", "644"],
]
systemd-units = {}

[package.metadata.generate-rpm]
name = "beam"

