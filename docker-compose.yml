services:
  rustdrop:
    build: .
    image: ubermetroid/rustdrop:latest
    container_name: rustdrop
    restart: unless-stopped
    ports:
      - ${PORT:-4401}:4401
    volumes:
      - ${RUSTDROP_UPLOADS_PATH:-./uploads}:/app/uploads
      - ${RUSTDROP_DATA_PATH:-./data}:/app/data
    environment:
      PORT: 4401
      SITE_TITLE: ${RUSTDROP_TITLE:-RustDrop}
      RUSTDROP_PIN: ${RUSTDROP_PIN:-}
      BASE_URL: ${BASE_URL:-http://localhost:4401}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      TZ: ${TZ:-UTC}
      MAX_FILE_SIZE: 1024
      AUTO_UPLOAD: "true"
      SHOW_FILE_LIST: "true"
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
